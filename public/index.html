<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faceit & Steam Lobby Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/logo.png">
</head>
<body>

    <div class="search-container">
        <div class="header-title">
            <img src="/logo.png" alt="Lobby Finder Logo" class="main-logo">
            <h1>Faceit & Steam Lobby Finder</h1>
        </div>
        <p>Enter links or IDs (separate multiple with a semicolon ';'):</p>
        <div class="input-group">
            <input type="text" id="steamIdInput" placeholder="e.g., 76561198... ; KastenBrot ; https://..." />
            <button id="searchButton">Search</button>
        </div>
    </div>

    <div id="kachelContainer" class="kachel-container">
        </div>

    <script src="script.js"></script>
</body>
</html>
